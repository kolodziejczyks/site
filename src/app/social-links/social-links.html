<div class="social-links">
  @for (s of links(); track s.label) {
    <a class="icon-btn" [href]="s.href" target="_blank" rel="noopener" [attr.aria-label]="s.label">
      @if (s.path) {
        <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
          <path [attr.fill-rule]="s.evenOdd ? 'evenodd' : null" [attr.d]="s.path" fill="currentColor" />
        </svg>
      } @else {
        <span class="msym">{{ s.glyph }}</span>
      }
    </a>
  }
</div>
