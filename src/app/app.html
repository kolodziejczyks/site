<div class="shell">
  <!-- Desktop navigation rail -->
  <nav class="rail" aria-label="Nawigacja główna">
    <a class="avatar" routerLink="/o-mnie" aria-label="O mnie">
      <img src="/portrait.jpg" alt="" />
    </a>
    @for (item of nav; track item.path) {
      <a
        class="rail-item"
        [routerLink]="'/' + item.path"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: item.path === '' }"
      >
        <span class="pill"><span class="msym">{{ item.icon }}</span></span>
        <span class="label">{{ item.label }}</span>
      </a>
    }
  </nav>

  <div class="main-col">
    <!-- Top app bar -->
    <header class="topbar">
      <div class="brand">
        <span class="name serif">Szymon Kołodziejczyk</span>
        <span class="subtitle">{{ subtitle }}</span>
      </div>
      <div class="actions">
        <button type="button" class="icon-btn" (click)="toggleTheme()" aria-label="Przełącz motyw">
          <span class="msym">{{ theme() === 'dark' ? 'light_mode' : 'dark_mode' }}</span>
        </button>
        <app-social-links [links]="socials" />
      </div>
    </header>

    <main class="content">
      <router-outlet />
    </main>

    <footer class="site-footer">
      <span>© 2026 Szymon Kołodziejczyk</span>
      <span class="sep">·</span>
      <a href="/prywatnosc">Polityka prywatności</a>
    </footer>
  </div>

  <!-- Mobile bottom navigation -->
  <nav class="bottom-nav" aria-label="Nawigacja główna">
    @for (item of nav; track item.path) {
      <a
        class="bottom-item"
        [routerLink]="'/' + item.path"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: item.path === '' }"
      >
        <span class="pill"><span class="msym">{{ item.icon }}</span></span>
        <span class="label">{{ item.label }}</span>
      </a>
    }
  </nav>
</div>
