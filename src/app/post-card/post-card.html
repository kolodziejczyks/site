<button type="button" class="thumb" (click)="openPost()" [attr.aria-label]="post().caption || 'Wpis'">
  @if (post().thumbnailUrl) {
    <img [src]="post().thumbnailUrl" [alt]="post().caption || ''" loading="lazy" />
  } @else {
    <span class="placeholder msym">image</span>
  }
  <span class="platform">{{ post().platform }}</span>
</button>

@if (!compact()) {
  <div class="meta">
    <span class="date">{{ dateLabel() }}</span>
    @if (post().sources.length) {
      <button type="button" class="sources-btn" (click)="openSources($event)">
        <span class="msym">menu_book</span>
        Źródła · {{ post().sources.length }}
      </button>
    } @else {
      <span class="no-sources">Nie dodano jeszcze źródeł</span>
    }
  </div>
}
