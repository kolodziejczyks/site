<section class="about">
  <div class="text">
    <span class="chip">O mnie</span>
    <h1 class="serif">Relacje z Warszawy</h1>
    <p class="lead">
      Tu wrzucam to, o czym akurat za dużo gadam — media, technologia i polityka.
    </p>

    <div class="facts">
      @for (f of facts; track f.label) {
        <div class="fact">
          <span class="msym">{{ f.icon }}</span>
          <span class="fact-label">{{ f.label }}</span>
          <span class="fact-value">{{ f.value }}</span>
        </div>
      }
    </div>
  </div>

  <div class="portrait">
    <img src="/portrait.jpg" alt="Portret — Szymon Kołodziejczyk" />
  </div>
</section>
